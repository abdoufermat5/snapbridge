name: Debian Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_DEB_VERSION: "3.6.3"

jobs:
  build-debian-packages:
    name: Build Debian packages
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy
          rustup target add x86_64-unknown-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            binutils-aarch64-linux-gnu \
            build-essential \
            crossbuild-essential-arm64 \
            dpkg-dev \
            gcc-aarch64-linux-gnu \
            pkg-config

      - name: Install cargo-deb
        run: cargo install cargo-deb --version "${CARGO_DEB_VERSION}" --locked

      - name: Validate release tag
        run: |
          package_version="$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${package_version}" >&2
            exit 1
          fi
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

      - name: Test
        run: cargo test --locked

      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build amd64 Debian package
        run: |
          mkdir -p dist
          cargo deb \
            --target x86_64-unknown-linux-gnu \
            --output "dist/proxsnap_${PACKAGE_VERSION}_amd64.deb" \
            -- \
            --locked

      - name: Build arm64 Debian package
        env:
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo deb \
            --target aarch64-unknown-linux-gnu \
            --output "dist/proxsnap_${PACKAGE_VERSION}_arm64.deb" \
            -- \
            --locked

      - name: Inspect Debian packages
        run: |
          for package in dist/*.deb; do
            echo "::group::dpkg-deb --info ${package}"
            dpkg-deb --info "${package}"
            echo "::endgroup::"
            echo "::group::dpkg-deb --contents ${package}"
            dpkg-deb --contents "${package}"
            echo "::endgroup::"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.deb > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/*.deb
            dist/SHA256SUMS
